# prova's own test suite (proof-driven development of prova, by prova).
[run]
proofs       = ["proofs"]            # dir-name pattern: every `proofs/` below the root (the default)
config       = ".prova/config.lua"    # the runtime companion, tucked into the .prova/ nook
plugin_root  = ".prova/plugins"      # this project's own plugins (root-relative). No default,
                                     # and exactly one: anything from elsewhere gets a name and a
                                     # pinned source in [plugins] instead.

# The `parallels` plugin now lives in its own repo, consumed here as a pinned git source — exactly as
# any package would, which is the whole point of the extraction. It was incubated in-tree under
# .prova/plugins/parallels; that copy is retired. Pinned to the released `v1` tag.
[plugins]
parallels = { git = "https://github.com/prova-rs/prova-parallels", tag = "v1" }

# This repo's /.luarc.json is deliberately COMMITTED and hand-maintained (it points at library/ —
# the hand-written stub sources, because prova is where they come from). prova's own managed
# entries are machine-local absolute paths, which would keep the tracked file dirty on every
# contributor's machine — so the pointer is hands-off here. Annotations still sync to the shared
# cache; only the pointer is unmanaged.
[luals]
manage = "never"

# Topologies this project exposes by name (`prova up <name>`). `vm` comes from the `parallels` plugin's
# advertisement; its `requires = ["prlctl"]` gates the stand-up, so on a machine without Parallels
# Desktop `prova up vm` skips cleanly instead of failing. `options` is handed to the factory
# (`vm(ctx, { image = … })`) — the base template it linked-clones. Set `image` to a template that
# exists in your Parallels library.
[topologies]
vm = { plugin = "parallels", topology = "vm", options = { image = "ubuntu-24.04" } }
