name: Build

on:
  push:
    branches:
      - '**'

jobs:
  build:
    name: Build ${{ matrix.os }}
    strategy:
      # Surface every platform's failure in one run rather than cancelling siblings.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # `pulsar`'s build script compiles .proto files and needs protoc on PATH. Runner images
      # do not ship it (a dev laptop usually has it via brew/apt, which is exactly how this
      # dependency stays invisible until CI).
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable Rust Dependency Caching
        uses: Swatinem/rust-cache@v2

      # Prova's default features vendor and compile C libraries from source (mlua/Lua,
      # librdkafka). Building all three release platforms on every push means a
      # platform-specific toolchain break surfaces here, not at release time — release.yml
      # builds the same matrix and a red leg there blocks the Homebrew tap update.
      - name: Build
        run: cargo build

      - name: Test
        # --no-fail-fast: one run reports EVERY failing binary. Windows suites were being
        # discovered one 9-minute cycle at a time as each fail-fast stop unmasked the next.
        run: cargo test --no-fail-fast
        env:
          # Opt-in for the suites that bind 0.0.0.0 to prove the cross-substrate mock vantage
          # (mock_network_vantage, c2_e2e). Off by default so a local `cargo test` never trips the
          # macOS Application Firewall's "accept incoming connections?" prompt; CI runs them on
          # every leg. GitHub runners have the firewall disabled, so no prompt blocks the run.
          PROVA_TEST_NETWORK_VANTAGE: "1"
