[package]
name = "prova-core"
version.workspace = true
edition.workspace = true
license.workspace = true

[dependencies]
mlua = { workspace = true, features = ["async"] }
# Async from the ground up: a per-run current-thread runtime drives many concurrent Lua
# coroutines cooperatively (I/O-bound concurrency for load/stress; real timeouts via cancellation).
# `process` powers `shell`; `io-util` is its runtime dep for child pipes; `net` is the `docker`
# module's TCP readiness probe.
tokio = { version = "1", features = ["rt", "time", "macros", "process", "io-util", "net"] }
futures = { version = "0.3", default-features = false, features = ["std", "async-await"] }
# Structured, streaming output for machine consumers (CI, and a future GUI/IDE frontend).
serde_json = "1"
# Filesystem globbing for the `fs` module (fs.glob(root, "**/*.rs")).
glob = "0.3"
# Home-directory discovery for the XDG SystemLayout (config/cache/data dirs). Light, no transitive
# weight; only used to locate `~` — the XDG_* env vars and path joins are done by hand.
dirs = "5"
# The `http` module. v1 is HTTP-only (no TLS) to stay light — covers localhost service
# boot-and-probe; an https feature can layer rustls on later. Feature-gated so builds can opt out.
reqwest = { version = "0.12", optional = true, default-features = false }
# The `postgres`/`mysql`/`sqlite` modules — one general Connection API over sqlx's `Any` driver
# (backend chosen by URL scheme). Heavy, so feature-gated per engine (default on). No TLS in v1
# (local/CI containers).
sqlx = { version = "0.8", optional = true, default-features = false, features = [
    "runtime-tokio",
    "any",
] }
# The `docker` module — the typed Docker daemon client (bollard), not CLI-shelling: structured
# errors, log streams, exec, port inspection. Feature-gated (default on).
bollard = { version = "0.18", optional = true }
# The `grpc` module — a *native*, dynamic gRPC client (no `grpcurl` on PATH). It discovers the
# server's schema at runtime via gRPC Server Reflection (`tonic-reflection`'s client), builds request
# messages from Lua tables against the fetched descriptors (`prost-reflect`'s `DynamicMessage`), and
# invokes with a generic tonic codec. Versions track archetect-core's tonic/prost (0.14) so the
# workspace lockfile dedupes to a single build. Plaintext-only in v1 (local/CI containers), matching
# `http`'s no-TLS stance. Feature-gated (default on); `prova-core` still builds `--no-default-features`.
tonic = { version = "0.14", default-features = false, features = ["channel"], optional = true }
tonic-reflection = { version = "0.14", default-features = false, optional = true }
prost = { version = "0.14", optional = true }
prost-types = { version = "0.14", optional = true }
prost-reflect = { version = "0.16.5", features = ["serde"], optional = true }
# The `yaml` module — parse YAML (k8s manifests, CI configs, compose files) to Lua values, the way
# `http`'s `:json()` does for JSON. General black-box-testing capability, not archetype-specific.
# Maintained serde_yaml fork. Feature-gated (default on); light, pure-Rust.
serde_yaml_ng = { version = "0.10.0", optional = true }
serde = { version = "1", optional = true }
# The `redis` module — a thin async client (get/set/del/exists/incr/ping + a generic `command`) for
# asserting on a cache dependency. No TLS in v1 (local/CI containers). Feature-gated (default on).
redis = { version = "1.3.0", default-features = false, features = ["tokio-comp"], optional = true }
# The `pulsar` module — a thin async produce/consume client for asserting on a messaging dependency.
# apache pulsar-rs on the tokio runtime. Unlike the other clients, pulsar always links a TLS backend;
# the tokio path uses native-tls (system openssl) — the only tokio-compatible option (its rustls
# variants are async-std-only). We connect plaintext in v1; token/TLS auth is a later opts addition.
# `tokio-runtime` only (no compression/oauth2) to stay as light as pulsar allows. Feature-gated.
pulsar = { version = "6.8.0", default-features = false, features = ["tokio-runtime"], optional = true }
# The `s3` module — a thin object-storage client (put/get/list/delete) for asserting on an S3/MinIO
# dependency. rust-s3 with rustls (pure-Rust, statically links — no openssl, static-binary friendly;
# also enables real HTTPS S3 later). Feature-gated (default on).
rust-s3 = { version = "0.37.2", default-features = false, features = ["tokio-rustls-tls", "tags", "fail-on-err"], optional = true }

# The `kafka` module — a thin async produce/consume client (rdkafka). rdkafka-sys vendors librdkafka
# and builds it from source, STATICALLY linking it — so the runtime binary stays self-contained (the
# build-time C compile is a CI concern). No SSL/SASL features → no openssl. Plaintext only in v1.
# Feature-gated (default on).
#
# The build path differs by platform, hence two tables: librdkafka's default build is an autotools
# `configure` shell script, which MSVC runners cannot execute (os error 193 — "not a valid Win32
# application"). `cmake-build` swaps in its CMake path, which is the supported way to build it on
# Windows. Unix keeps the lighter cc/make path so a laptop build needs no cmake.
[target.'cfg(not(windows))'.dependencies]
rdkafka = { version = "0.39.0", default-features = false, features = ["tokio"], optional = true }

[target.'cfg(windows)'.dependencies]
rdkafka = { version = "0.39.0", default-features = false, features = ["tokio", "cmake-build"], optional = true }

[features]
default = ["http", "postgres", "mysql", "sqlite", "docker", "grpc", "graphql", "yaml", "redis", "pulsar", "kafka", "s3"]
http = ["dep:reqwest"]
# GraphQL over HTTP (POST { query, variables } → { data, errors }); shares reqwest with `http`.
graphql = ["dep:reqwest"]
# SQL databases — one namespace per engine (feature = namespace = global), all returning the same
# generic Connection over sqlx's `Any` driver.
postgres = ["dep:sqlx", "sqlx/postgres"]
mysql = ["dep:sqlx", "sqlx/mysql"]
sqlite = ["dep:sqlx", "sqlx/sqlite"]
docker = ["dep:bollard"]
grpc = [
    "dep:tonic",
    "dep:tonic-reflection",
    "dep:prost",
    "dep:prost-types",
    "dep:prost-reflect",
]
yaml = ["dep:serde_yaml_ng", "dep:serde"]
redis = ["dep:redis"]
pulsar = ["dep:pulsar"]
kafka = ["dep:rdkafka"]
s3 = ["dep:rust-s3"]
