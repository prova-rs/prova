# Composite GitHub Action: run a Prova suite from a repo's `prova.toml`.
#
# Usage in a workflow:
#   - uses: archetect/prova/ci@main
#     with:
#       profile: ci            # optional: prova.toml profile to run
#       manifest: prova.toml   # optional: manifest path (default prova.toml)
#       args: "--jobs 8"       # optional: extra prova flags
#
# NOTE: until Prova publishes release binaries, this builds from source (slow, cached). Once
# published, replace the install step with a released-binary download and pin a version.
name: "Prova"
description: "Run a Prova acceptance/integration/environment test suite (reads prova.toml)."
inputs:
  profile:
    description: "Manifest profile to run (prova --profile <profile>)."
    required: false
    default: ""
  manifest:
    description: "Path to the suite manifest."
    required: false
    default: "prova.toml"
  args:
    description: "Extra arguments appended to the prova invocation."
    required: false
    default: ""
runs:
  using: "composite"
  steps:
    - name: Install prova
      shell: bash
      run: |
        if ! command -v prova >/dev/null 2>&1; then
          # TODO: swap for a released-binary download once Prova ships releases.
          cargo install --git https://github.com/archetect/prova prova-cli
        fi
    - name: Run prova
      shell: bash
      run: |
        set -euo pipefail
        FLAGS="--manifest ${{ inputs.manifest }} ${{ inputs.args }}"
        if [ -n "${{ inputs.profile }}" ]; then
          FLAGS="--profile ${{ inputs.profile }} $FLAGS"
        fi
        prova $FLAGS
