[plugin]
name = "lib"
description = "A library plugin that privately depends on `inner`. Proves a plugin can bundle a dependency without exposing it to consumers (the bundled + isolated model)."

# This plugin's PRIVATE dependency map — declared exactly the way a project declares its plugins in
# prova.toml [plugins], so there is one surface to learn rather than two.
#
# `inner` resolves for THIS plugin's code and nowhere else: a consumer that requires `lib` gets `lib`,
# and `require("inner")` fails for them. That is what proofs/plugins/isolation_test.lua pins.
#
# Note it lives INSIDE this plugin (deps/inner), not at the top of .prova/plugins/. A top-level
# directory there is a *project* plugin and is globally requirable by design — putting a private
# dependency there would leak it to everyone, which is the very thing being prevented.
[plugins]
inner = { path = "deps/inner" }
